<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Local RAG Explorer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --ink: #1a1814;
      --paper: #f5f2eb;
      --accent: #c84b2f;
      --accent2: #2a6b4a;
      --muted: #7a7468;
      --border: #d8d3c8;
      --chunk-bg: #fffdf7;
      --mono: 'DM Mono', monospace;
      --serif: 'Instrument Serif', serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--mono);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      border-bottom: 1.5px solid var(--ink);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--paper);
      
    }

    .logo {
      font-family: var(--serif);
      font-size: 26px;
    }

    .logo em {
      color: var(--accent);
      font-style: italic;
    }

    .status {
      display: flex;
      gap: 12px;
      font-size: 11px;
      color: var(--muted);
    }

    .status span {
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 4px;
      background: white;
    }

    main {
      display: grid;
      grid-template-columns: 320px 1fr;
      flex: 1;
      overflow: hidden;
    }

    .sidebar {
      border-right: 1.5px solid var(--ink);
      background: white;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-title {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .docs {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .doc-card {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      background: var(--chunk-bg);
    }

    .doc-name {
      font-size: 13px;
      margin-bottom: 6px;
    }

    .upload-btn {
      margin: 14px;
      padding: 12px;
      border: 1.5px dashed var(--border);
      background: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--mono);
      transition: 0.2s;
    }

    .upload-btn:hover {
      border-color: var(--ink);
    }

    .chat {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .msg {
      display: flex;
      gap: 12px;
    }

    .msg-role {
      width: 60px;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      padding-top: 4px;
    }

    .msg-content {
      flex: 1;
      padding-left: 14px;
      border-left: 2px solid var(--border);
      line-height: 1.7;
      font-size: 13px;
    }

    .msg.ai .msg-content {
      border-color: var(--accent2);
    }

    .retrieval {
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 14px;
      background: white;
      overflow-x: auto;
      display: flex;
      gap: 12px;
    }

    .chunk {
      min-width: 240px;
      max-width: 240px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      background: var(--chunk-bg);
    }

    .chunk-source {
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .chunk-score {
      font-size: 10px;
      color: var(--accent2);
      margin-bottom: 8px;
    }

    .chunk-text {
      font-size: 11px;
      line-height: 1.6;
    }

    .input-bar {
      border-top: 1.5px solid var(--ink);
      background: white;
      padding: 16px;
      display: flex;
      gap: 10px;
    }

    textarea {
      flex: 1;
      resize: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
      background: var(--paper);
    }

    button {
      font-family: var(--mono);
    }

    .send-btn {
      padding: 12px 22px;
      border: none;
      background: var(--ink);
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    .send-btn:hover {
      background: var(--accent);
    }

    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-bg.open {
      display: flex;
    }

    .modal {
      background: white;
      width: 420px;
      border-radius: 8px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .modal h3 {
      font-family: var(--serif);
      font-size: 24px;
    }

    .modal input {
      border: 1px solid var(--border);
      padding: 10px;
      border-radius: 6px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .thinking {
      display: flex;
      gap: 5px;
      padding-top: 6px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent2);
      animation: pulse 1.2s infinite;
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s;
    }
    .chunk-text {
  margin-top: 10px;
  font-size: 11px;
  line-height: 1.6;
  color: var(--ink);

  display: -webkit-box;
  -webkit-line-clamp: 8;
  line-clamp: 8;
  -webkit-box-orient: vertical;

  overflow: hidden;
}

    @keyframes pulse {
      0%,100% { opacity: 0.3; }
      50% { opacity: 1; }
    
      
    }
  </style>
</head>

<body>

<header>
  <div class="logo"><em>Local</em> RAG</div>
  <div class="input-bar">
    <div
  id="metrics-bar"
  style="
    padding:10px 18px;
    border-top:1px solid var(--border);
    font-size:11px;
    color:var(--muted);
    background:white;
  "
>
  Ready
</div>
  </div>

  <div class="status">
    <span id="backend-status">Backend: ...</span>
    <span id="ollama-status">Ollama: ...</span>
  </div>
  <select
  id="model-select"
  style="
    padding:6px 10px;
    border:1px solid var(--border);
    background:white;
    border-radius:4px;
    font-family:var(--mono);
  "
>
  <option value="llama3">
    llama3
  </option>

  <option value="phi3">
    phi3
  </option>
  <option value="tinyllama">
    tinyllama
  </option>
</select>
</header>

<main>

  <div class="sidebar">

    <div class="sidebar-header">
      <div class="sidebar-title">Documents</div>
    </div>

    <div class="docs" id="docs"></div>

    <button class="upload-btn" onclick="openModal()">
      + Upload Document
    </button>

  </div>

  <div class="chat">

    <div class="messages" id="messages">

      <div class="msg ai">
        <div class="msg-role">RAG</div>
        <div class="msg-content">
          Upload documents and ask questions using your local Ollama setup.
        </div>
      </div>

    </div>

    <div class="retrieval" id="retrieval"></div>

    <div class="input-bar">

      <textarea
        id="query"
        rows="2"
        placeholder="Ask a question..."
      ></textarea>

      <button
        class="send-btn"
        onclick="handleQuery()"
      >
        Ask →
      </button>

    </div>

  </div>

</main>

<div class="modal-bg" id="modal-bg">

  <div class="modal">

    <h3>Upload Document</h3>

    <input
      type="file"
      id="file-input"
    />

    <div class="modal-actions">

      <button onclick="closeModal()">
        Cancel
      </button>

      <button onclick="uploadDocument()">
        Upload
      </button>

    </div>

  </div>

</div>

<script>

const API = "http://127.0.0.1:8000";

async function checkHealth() {

  try {

    const res = await fetch(`${API}/health`);

    const data = await res.json();

    document.getElementById("backend-status").innerText =
      "Backend: Online";

    document.getElementById("ollama-status").innerText =
      `Ollama: ${data.ollama}`;

  } catch (err) {

    console.error(err);

    document.getElementById("backend-status").innerText =
      "Backend: Offline";

    document.getElementById("ollama-status").innerText =
      "Ollama: Offline";
  }
}

async function loadDocuments() {

  try {

    const res = await fetch(`${API}/documents`);

    const docs = await res.json();

    const docsEl = document.getElementById("docs");

    docsEl.innerHTML = "";

    docs.forEach(doc => {

      const el = document.createElement("div");

      el.className = "doc-card";

      el.innerHTML = `
        <div class="doc-name">${doc.name}</div>
      `;

      docsEl.appendChild(el);
    });

  } catch (err) {

    console.error(err);
  }
}

function openModal() {

  document
    .getElementById("modal-bg")
    .classList.add("open");
}

function closeModal() {

  document
    .getElementById("modal-bg")
    .classList.remove("open");
}

async function uploadDocument() {

  try {

    const input =
      document.getElementById("file-input");

    if (!input.files.length) {

      alert("Select a file");

      return;
    }

    const formData = new FormData();

    formData.append(
      "file",
      input.files[0]
    );

    console.log("Uploading...");

    const res = await fetch(
      `${API}/upload`,
      {
        method: "POST",
        body: formData
      }
    );

    console.log("Response status:", res.status);

    if (!res.ok) {

      throw new Error(
        `HTTP ${res.status}`
      );
    }

    const data = await res.json();

    console.log("Upload response:", data);

    closeModal();

    await loadDocuments();

    alert(
      `${data.document} uploaded successfully`
    );

  } catch (err) {

    console.error("UPLOAD ERROR:", err);

    alert(
      "Upload failed: " + err.message
    );
  }
}

function addMessage(role, content) {

  const messages =
    document.getElementById("messages");

  const el = document.createElement("div");

  el.className = `msg ${role}`;

  el.innerHTML = `
    <div class="msg-role">
      ${role === "ai" ? "RAG" : "YOU"}
    </div>

    <div class="msg-content">
      ${content}
    </div>
  `;

  messages.appendChild(el);

  messages.scrollTop =
    messages.scrollHeight;
}

function addThinking() {

  const messages =
    document.getElementById("messages");

  const el = document.createElement("div");

  el.className = "msg ai";

  el.id = "thinking";

  el.innerHTML = `
    <div class="msg-role">RAG</div>

    <div class="msg-content">
      <div class="thinking">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  `;

  messages.appendChild(el);

  messages.scrollTop =
    messages.scrollHeight;
}

function removeThinking() {

  const thinking =
    document.getElementById("thinking");

  if (thinking) {
    thinking.remove();
  }
}

function renderChunks(chunks) {

  const retrieval =
    document.getElementById("retrieval");

  retrieval.innerHTML = "";

  if (!chunks.length) {

    retrieval.innerHTML = `
      <div style="
        padding:12px;
        color:#777;
      ">
        No retrieved chunks
      </div>
    `;

    return;
  }

  chunks.forEach(chunk => {

    const el = document.createElement("div");

    el.className = "chunk";

    el.innerHTML = `

      <div class="chunk-source">
        ${chunk.document}
      </div>

      <div class="chunk-score">
        Similarity: ${chunk.score}
      </div>

      <div class="chunk-text">
        ${chunk.text}
      </div>

    `;

    retrieval.appendChild(el);
  });
}

async function handleQuery() {

  try {

    const query =
      document
        .getElementById("query")
        .value
        .trim();

    if (!query) return;

    addMessage("user", query);

    document.getElementById("query").value = "";

    addThinking();

    document.getElementById(
      "metrics-bar"
    ).innerHTML = "Processing...";

    const res = await fetch(
      `${API}/chat`,
      {
        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({
          query: query,
          top_k: 1,
model: document.getElementById(
  "model-select"
).value
        })
      }
    );

    const data = await res.json();

    removeThinking();

    addMessage(
      "ai",
      data.answer || "No response"
    );

    renderChunks(
      data.sources || []
    );

    if (data.metrics) {

      document.getElementById(
        "metrics-bar"
      ).innerHTML = `

        Retrieval:
        ${data.metrics.retrieval_time}s

        •

        Generation:
        ${data.metrics.generation_time}s

        •

        Total:
        ${data.metrics.total_time}s

        •

        Chunks:
        ${data.metrics.chunks_used}

      `;
    }

  } catch (err) {

    console.error(err);

    removeThinking();

    addMessage(
      "ai",
      "Frontend error: " + err.message
    );
  }
}

document
  .getElementById("query")
  .addEventListener("keydown", e => {

    if (
      e.key === "Enter" &&
      !e.shiftKey
    ) {

      e.preventDefault();

      handleQuery();
    }
  });

checkHealth();

loadDocuments();

</script>

</body>
</html>
